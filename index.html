<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>選股雷達</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #242424;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text: #f0f0f0;
      --text2: #888;
      --text3: #555;
      --green: #00c896;
      --red: #ff5c5c;
      --blue: #4a9eff;
      --yellow: #f5a623;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, "Helvetica Neue", sans-serif; min-height: 100vh; }

    /* Header */
    .header { padding: 20px 16px 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 0.5px solid var(--border); }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .header-top h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
    .update-time { font-size: 11px; color: var(--text3); }

    /* Sort bar */
    .sort-bar { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
    .sort-bar::-webkit-scrollbar { display: none; }
    .sort-btn { flex-shrink: 0; font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .sort-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }

    /* Stock list */
    .stock-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

    /* Card */
    .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.15s; }
    .card.open { border-color: var(--border2); }

    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
    .card-left { display: flex; align-items: center; gap: 10px; }
    .code-badge { font-size: 11px; font-weight: 600; color: var(--text3); background: var(--bg3); padding: 3px 8px; border-radius: 6px; letter-spacing: 0.5px; }
    .stock-name { font-size: 15px; font-weight: 500; }
    .card-right { display: flex; align-items: center; gap: 8px; }
    .icons { display: flex; gap: 4px; }
    .icon { font-size: 14px; }
    .chevron { font-size: 10px; color: var(--text3); transition: transform 0.25s; }
    .card.open .chevron { transform: rotate(180deg); }

    /* Detail panel */
    .detail { display: none; border-top: 0.5px solid var(--border); }
    .card.open .detail { display: block; }

    /* Price row */
    .price-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
    .price-left { display: flex; align-items: baseline; gap: 8px; }
    .price { font-size: 22px; font-weight: 600; }
    .change { font-size: 13px; }
    .up { color: var(--green); }
    .dn { color: var(--red); }
    .score-wrap { display: flex; align-items: center; gap: 6px; }
    .dots { display: flex; gap: 3px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bg3); }
    .dot.on { background: var(--green); }
    .score-label { font-size: 11px; color: var(--text3); }

    /* Section */
    .section { padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
    .section:last-child { border-bottom: none; }
    .section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

    /* Check rows */
    .check-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
    .check-label { font-size: 13px; color: var(--text2); }
    .check-val { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; }
    .badge { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; }
    .badge.pass { background: rgba(0,200,150,0.15); color: var(--green); }
    .badge.fail { background: rgba(255,92,92,0.12); color: var(--red); }

    /* News */
    .news-item { padding: 7px 0; border-bottom: 0.5px solid var(--border); }
    .news-item:last-child { border-bottom: none; }
    .news-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .news-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 5px; background: rgba(74,158,255,0.15); color: var(--blue); }
    .news-source { font-size: 11px; color: var(--text3); }
    .news-text { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 4px; }
    .news-link { font-size: 11px; color: var(--blue); text-decoration: none; display: inline-flex; align-items: center; gap: 3px; }

    /* Loading / Error */
    .status { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--text3); font-size: 14px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>選股雷達 📡</h1>
    <span class="update-time" id="update-time">載入中...</span>
  </div>
  <div class="sort-bar">
    <button class="sort-btn active" data-sort="score">符合項目</button>
    <button class="sort-btn" data-sort="change_desc">漲幅 ↓</button>
    <button class="sort-btn" data-sort="change_asc">跌幅 ↓</button>
    <button class="sort-btn" data-sort="price_desc">股價 ↓</button>
    <button class="sort-btn" data-sort="price_asc">股價 ↑</button>
  </div>
</div>

<div id="app">
  <div class="status"><div class="spinner"></div><span>載入數據中...</span></div>
</div>

<script>
let allStocks = [];
let currentSort = 'score';
let openCards = {};

// 計算符合分數
function getScore(s) {
  let passed = 0, total = 0;
  const sections = [s.fundamental, s.revenue, s.chips].filter(Boolean);
  sections.forEach(sec => {
    if (sec.items) sec.items.forEach(i => { total++; if (i.pass) passed++; });
  });
  if (s.topic && s.topic.news && s.topic.news.length > 0) { total++; passed++; }
  return { passed, total };
}

// 排序
function getSorted(stocks) {
  const arr = [...stocks];
  if (currentSort === 'score') arr.sort((a, b) => getScore(b).passed - getScore(a).passed);
  else if (currentSort === 'change_desc') arr.sort((a, b) => b.change_pct - a.change_pct);
  else if (currentSort === 'change_asc') arr.sort((a, b) => a.change_pct - b.change_pct);
  else if (currentSort === 'price_desc') arr.sort((a, b) => b.price - a.price);
  else if (currentSort === 'price_asc') arr.sort((a, b) => a.price - b.price);
  return arr;
}

// 渲染新聞
function renderNews(news) {
  if (!news || news.length === 0) return '<div class="empty">暫無相關新聞</div>';
  return news.map(n => `
    <div class="news-item">
      <div class="news-top">
        <span class="news-tag">${n.tag || '新聞'}</span>
        <span class="news-source">${n.source || ''}</span>
      </div>
      <div class="news-text">${n.title || n.text || ''}</div>
      ${n.url ? `<a class="news-link" href="${n.url}" target="_blank">閱讀原文 →</a>` : ''}
    </div>`).join('');
}

// 渲染細項
function renderItems(items) {
  if (!items || items.length === 0) return '';
  return items.map(i => `
    <div class="check-row">
      <span class="check-label">${i.label}</span>
      <span class="check-val">
        <span class="badge ${i.pass ? 'pass' : 'fail'}">${i.pass ? '✓' : '✗'}</span>
        ${i.value}
      </span>
    </div>`).join('');
}

// 渲染單張卡片
function renderCard(s) {
  const { passed, total } = getScore(s);
  const isOpen = openCards[s.code];
  const changeClass = s.change_pct >= 0 ? 'up' : 'dn';
  const sign = s.change_pct >= 0 ? '+' : '';
  const dots = Array.from({ length: total }, (_, i) =>
    `<div class="dot ${i < passed ? 'on' : ''}"></div>`).join('');
  const icons = (s.icons || []).map(ic => `<span class="icon">${ic}</span>`).join('');

  return `
    <div class="card ${isOpen ? 'open' : ''}" id="card-${s.code}">
      <div class="card-header" onclick="toggle('${s.code}')">
        <div class="card-left">
          <span class="code-badge">${s.code}</span>
          <span class="stock-name">${s.name}</span>
        </div>
        <div class="card-right">
          <div class="icons">${icons}</div>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="detail">
        <div class="price-row">
          <div class="price-left">
            <span class="price">$${Number(s.price).toLocaleString()}</span>
            <span class="change ${changeClass}">${sign}${s.change} (${sign}${s.change_pct}%)</span>
          </div>
          <div class="score-wrap">
            <div class="dots">${dots}</div>
            <span class="score-label">${passed}/${total}</span>
          </div>
        </div>
        <div class="section">
          <div class="section-title">📰 話題性</div>
          ${renderNews(s.topic && s.topic.news)}
        </div>
        <div class="section">
          <div class="section-title">💰 基本面</div>
          ${renderItems(s.fundamental && s.fundamental.items ? s.fundamental.items : s.fundamental)}
        </div>
        <div class="section">
          <div class="section-title">📈 營收動能</div>
          ${renderItems(s.revenue && s.revenue.items ? s.revenue.items : s.revenue)}
        </div>
        <div class="section">
          <div class="section-title">🏦 籌碼面</div>
          ${renderItems(s.chips && s.chips.items ? s.chips.items : s.chips)}
        </div>
      </div>
    </div>`;
}

// 渲染全部
function render() {
  const sorted = getSorted(allStocks);
  const app = document.getElementById('app');
  if (sorted.length === 0) {
    app.innerHTML = '<div class="empty">目前沒有股票數據</div>';
    return;
  }
  app.innerHTML = `<div class="stock-list">${sorted.map(renderCard).join('')}</div>`;
}

// 展開/收合
function toggle(code) {
  openCards[code] = !openCards[code];
  render();
  // 展開後滾動到卡片
  if (openCards[code]) {
    setTimeout(() => {
      const el = document.getElementById('card-' + code);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

// 排序按鈕
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    render();
  });
});

// 載入數據
async function loadData() {
  try {
    const res = await fetch('stocks.json?t=' + Date.now());
    if (!res.ok) throw new Error('無法載入數據');
    const data = await res.json();
    allStocks = data.stocks || [];
    document.getElementById('update-time').textContent = '更新：' + (data.updated_at || '');
    render();
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="status">
        <span>⚠️ 數據載入失敗</span>
        <span style="font-size:12px;">${e.message}</span>
      </div>`;
  }
}

loadData();
</script>
</body>
</html>
