<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>選股雷達</title>
<style>
:root{
  --bg:#0d0d0f;--bg2:#141416;--bg3:#1c1c20;--bg4:#252528;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f0f0f2;--text2:#b0b0b8;--text3:#60606a;
  --green:#00c896;--red:#ff5c5c;--orange:#ff9f43;--blue:#4a9eff;--gold:#f5c518;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;overscroll-behavior:none}

/* ─ Header ─ */
.hdr{background:var(--bg2);border-bottom:.5px solid var(--border);position:sticky;top:0;z-index:100;
  padding:6px 14px 0;padding-top:calc(env(safe-area-inset-top,0px) + 6px)}
#hdr-back{transition:opacity .15s}#hdr-back:active{opacity:.6}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.hdr-top h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.hdr-right{display:flex;align-items:center;gap:8px}
.upd{font-size:10px;color:var(--text3);text-align:right;line-height:1.5}
.foi-bar{background:var(--bg2);border-bottom:.5px solid var(--border);padding:5px 14px}
.foi-inner{display:flex;align-items:center;gap:8px;font-size:11px}
.foi-label{color:var(--text3);flex-shrink:0;font-weight:600}
.foi-detail{color:var(--text2);flex:1;font-size:10px}
.foi-net{font-size:12px;font-weight:800;flex-shrink:0}
.foi-bull{color:var(--green)}.foi-bear{color:var(--red)}
.refresh-btn{background:none;border:1px solid var(--bg4);font-size:17px;color:var(--text2);cursor:pointer;padding:3px 8px;border-radius:8px;transition:transform .5s;line-height:1;margin-right:6px}
.refresh-btn.spinning{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cfg-btn{background:var(--bg3);border:.5px solid var(--border2);border-radius:50%;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;flex-shrink:0}

.sort-bar{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.sort-bar::-webkit-scrollbar{display:none}
.sbtn{flex-shrink:0;font-size:11px;padding:4px 11px;border-radius:14px;border:.5px solid var(--border2);
  background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .15s}
.sbtn.active{background:var(--bg4);color:var(--text)}

/* ─ Tabs ─ */
.tabs{display:flex;background:var(--bg2);border-bottom:.5px solid var(--border);padding:0 10px}
.tab{flex:1;padding:8px 2px;text-align:center;font-size:12px;color:var(--text3);background:none;border:none;
  border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500}
.tab.active{color:var(--text);border-bottom-color:var(--green)}

/* ─ Search + Filter ─ */
.search-wrap{padding:8px 12px 0}
.search-input{width:100%;background:var(--bg3);border:.5px solid var(--border2);border-radius:10px;
  padding:8px 12px;font-size:13px;color:var(--text);outline:none}
.search-input::placeholder{color:var(--text3)}

.filter-wrap{padding:7px 12px 0;position:relative}
.filter-row{display:flex;align-items:center;gap:7px}
.fbtn{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:5px 11px;
  border-radius:18px;border:.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;flex-shrink:0;transition:all .15s}
.fbtn.on{border-color:var(--blue);color:var(--blue);background:rgba(74,158,255,.08)}
.fbtn.ton{border-color:var(--gold);color:var(--gold);background:rgba(245,197,24,.08)}
.fclr{font-size:11px;color:var(--blue);cursor:pointer;font-weight:600}
.fov{display:none;position:fixed;inset:0;z-index:50}
.fov.open{display:block}
.fdd{display:none;position:absolute;top:calc(100% + 4px);left:12px;right:12px;background:var(--bg2);
  border:.5px solid var(--border2);border-radius:14px;z-index:51;padding:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.7);max-height:55vh;overflow-y:auto}
.fdd.open{display:block}
.fdd-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.8px;margin-bottom:9px}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.fi{font-size:11px;padding:7px 4px;border-radius:8px;border:.5px solid var(--border);
  background:var(--bg3);color:var(--text2);cursor:pointer;text-align:center;line-height:1.3;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:all .15s}
.fi.active{background:rgba(74,158,255,.12);border-color:var(--blue);color:var(--blue);font-weight:700}
.fi.th{background:rgba(245,197,24,.05);border-color:rgba(245,197,24,.15);color:var(--gold)}
.fi.th.active{background:rgba(245,197,24,.15);border-color:var(--gold);font-weight:700}
.fi-all{grid-column:span 3;font-size:12px;font-weight:600}
.fi-cnt{font-size:10px;opacity:.6;display:block;margin-top:1px}

/* ─ Card list ─ */
.card-list{padding:10px 12px;display:flex;flex-direction:column;gap:8px;
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 20px)}

/* ─ Card ─ */
.card{background:var(--bg2);border:.5px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s}
.card.open{border-color:var(--border2)}
.card-hdr{display:flex;align-items:center;padding:12px 13px;cursor:pointer;gap:10px}
.card-left{flex:1;min-width:0}
.card-top{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.code-badge{font-size:10px;font-weight:600;color:var(--text3);background:var(--bg4);padding:2px 6px;border-radius:4px;flex-shrink:0}
.sname{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icons{display:flex;gap:2px;flex-shrink:0}
.icon{font-size:11px}
.score-row{display:flex;align-items:center;gap:7px}
.sc-chip{font-size:12px;font-weight:700;flex-shrink:0}
.sc-bar{flex:1;max-width:90px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.sc-bar-fill{height:100%;border-radius:2px}
.ind-rank{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--bg4);color:var(--text3);display:inline-block;margin-top:4px}
.ind-rank.r1{background:rgba(245,197,24,.15);color:var(--gold)}
.ind-rank.r2{background:rgba(74,158,255,.12);color:var(--blue)}
.ind-rank.r3{background:rgba(0,200,150,.1);color:var(--green)}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.price-num{font-size:15px;font-weight:700}
.price-chg{font-size:11px}
.card-actions{display:flex;align-items:center;gap:5px;margin-top:3px}
.watch-btn{font-size:13px;background:none;border:none;cursor:pointer;padding:2px;opacity:.3;transition:opacity .15s}
.watch-btn.on{opacity:1}
.chevron{font-size:9px;color:var(--text3);transition:transform .25s}
.card.open .chevron{transform:rotate(180deg)}
.warn-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0}
.up{color:var(--green)}.dn{color:var(--red)}

/* ─ Detail ─ */
.detail{display:none;border-top:.5px solid var(--border)}
.card.open .detail{display:block}

.warn-bar{display:flex;flex-wrap:wrap;gap:5px;padding:8px 13px;border-bottom:.5px solid var(--border);background:rgba(255,92,92,.04)}
.wtag{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.w-high{background:rgba(255,92,92,.15);color:var(--red);border:.5px solid rgba(255,92,92,.3)}
.w-mid{background:rgba(255,159,67,.12);color:var(--orange);border:.5px solid rgba(255,159,67,.3)}

.price-row{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;border-bottom:.5px solid var(--border)}
.price-big{font-size:22px;font-weight:700}
.price-sub{font-size:12px;margin-top:2px}
.score-detail{text-align:right}
.score-total{font-size:24px;font-weight:700}
.score-sub{font-size:10px;color:var(--text3);margin-top:1px}
.score-pills{display:flex;gap:3px;justify-content:flex-end;margin-top:5px;flex-wrap:nowrap}
.sc-pill{font-size:11px;font-weight:700;padding:3px 6px;border-radius:6px;background:var(--bg4);color:var(--text3);font-variant-numeric:tabular-nums;line-height:1.2;letter-spacing:-.3px}
.sc-pill-tip{cursor:pointer;transition:opacity .15s}.sc-pill-tip:active{opacity:.7}
#pill-toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:10px 16px;width:260px;opacity:0;transition:all .25s;z-index:500;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#pill-toast.pt-show{opacity:1;transform:translateX(-50%) translateY(0)}
.pt-lbl{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px}
.pt-desc{font-size:11px;color:var(--text2);line-height:1.6}

.theme-badges{display:flex;flex-wrap:wrap;gap:4px;padding:8px 13px;border-bottom:.5px solid var(--border)}
.tbadge{font-size:10px;padding:2px 8px;border-radius:5px;background:rgba(245,197,24,.1);color:var(--gold);font-weight:600;border:.5px solid rgba(245,197,24,.2)}

.dtabs{display:flex;border-bottom:.5px solid var(--border);background:var(--bg2)}
.dtab{flex:1;padding:8px 2px;text-align:center;font-size:11px;font-weight:600;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s}
.dtab.active{color:var(--text);border-bottom-color:var(--green)}
.dpage{display:none;padding:13px}
.dpage.active{display:block}
.sig-list{display:flex;flex-direction:column;gap:10px}
.sig-card{border-radius:10px;padding:11px 13px;border-left:4px solid}
.sig-card.strong{background:rgba(0,200,150,.08);border-color:var(--green)}
.sig-card.medium{background:rgba(255,159,67,.08);border-color:var(--orange)}
.sig-card.weak{background:rgba(100,149,237,.08);border-color:var(--blue)}
.sig-head{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.sig-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.3px}
.sig-badge.strong{background:rgba(0,200,150,.18);color:var(--green)}
.sig-badge.medium{background:rgba(255,159,67,.18);color:var(--orange)}
.sig-badge.weak{background:rgba(100,149,237,.18);color:var(--blue)}
.sig-label{font-size:13px;font-weight:700;color:var(--text)}
.sig-reason{font-size:11px;color:var(--text3);margin-bottom:8px}
.sig-prices{display:flex;gap:8px;flex-wrap:wrap}
.sig-px{font-size:10.5px;padding:3px 8px;border-radius:6px;background:var(--bg3)}
.sig-px span{font-weight:700;color:var(--text)}

/* ─ Chips ─ */
.chip-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--border)}
.chip-row:last-child{border-bottom:none}
.dtbl td,.dtbl th{padding:5px 6px}
50%{opacity:.5}}
.dtbl .tdnum{text-align:right;font-variant-numeric:tabular-nums}
.dtbl th:not(:first-child){text-align:right}
.chip-label{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:5px}
.cbadge{font-size:9px;padding:2px 5px;border-radius:4px;font-weight:700}
.cbadge.pass{background:rgba(0,200,150,.1);color:var(--green)}
.cbadge.fail{background:rgba(255,92,92,.1);color:var(--red)}
.chip-right{text-align:right}
.chip-con{font-size:11px;color:var(--text3);margin-bottom:1px}
.chip-net{font-size:13px;font-weight:700}
.chip-detail-btn{display:block;text-align:right;margin-top:10px;font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0}
.tech-sec{margin-top:14px;padding-top:12px;border-top:.5px solid var(--border)}
.tech-title{font-size:12px;color:var(--text3);margin-bottom:10px}
.tech-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.tech-box{background:var(--bg3);border-radius:10px;padding:10px 8px;text-align:center}
.tech-lbl{font-size:10px;color:var(--text3);margin-bottom:4px}
.tech-val{font-size:18px;font-weight:800;margin-bottom:2px}
.tech-sub{font-size:10px;color:var(--text3)}
.ma60-row{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:12px}
.ma60-lbl{color:var(--text3);width:40px}
.ma60-val{font-weight:700;flex:1}
.rev-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:.5px solid var(--border);margin-top:8px;font-size:13px}
.rev-lbl{color:var(--text3);flex:1}
.rev-val{font-weight:800;font-size:15px}
.rev-score{font-size:11px;color:var(--text3)}

/* ─ Fundamental ─ */
.check-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--border)}
.check-row:last-child{border-bottom:none}
.chk-label{font-size:13px;color:var(--text2)}
.chk-val{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600}
.badge{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0}
.badge.pass{background:rgba(0,200,150,.1);color:var(--green)}
.badge.fail{background:rgba(255,92,92,.1);color:var(--red)}
.fair-sec{margin-top:13px}
.fair-title{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.7px;margin-bottom:8px}
.fair-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:7px}
.fair-box{background:var(--bg3);border-radius:8px;padding:8px;text-align:center}
.fair-lbl{font-size:10px;color:var(--text3);margin-bottom:3px}
.fair-val{font-size:14px;font-weight:700}
.fc{color:var(--blue)}.ff{color:var(--green)}.fo{color:var(--gold)}
.fair-cur{font-size:11px;color:var(--text3);line-height:1.6}

.method-block{margin-top:10px;border:0.5px solid var(--border);border-radius:10px;overflow:hidden}
.method-row{display:flex;align-items:center;padding:8px 11px;border-bottom:0.5px solid var(--border);gap:6px}
.method-row:last-child{border-bottom:none}
.method-lbl{font-size:11px;font-weight:700;color:var(--text3);width:62px;flex-shrink:0}
.method-range{font-size:12px;color:var(--text2);flex:1}
.method-fair{font-size:12px;font-weight:700;color:var(--gold);flex-shrink:0}

/* ─ Volume ─ */
.vol-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.vol-box{background:var(--bg3);border-radius:10px;padding:12px;text-align:center}
.vol-lbl{font-size:10px;color:var(--text3);margin-bottom:5px;line-height:1.4}
.vol-val{font-size:20px;font-weight:700}
.range-sec{margin-top:12px}
.range-lbl{font-size:10px;color:var(--text3);margin-bottom:6px}
.range-wrap{display:flex;align-items:center;gap:7px}
.range-end{font-size:11px;color:var(--text3);flex-shrink:0}
.range-bar{flex:1;height:5px;background:var(--bg4);border-radius:3px;position:relative}
.range-fill{position:absolute;inset:0;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--green))}
.range-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:#fff;top:-3px;transform:translateX(-50%);box-shadow:0 0 0 2px var(--bg)}

/* ─ News ─ */
.news-summary{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.npill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:11px}
.nbull{background:rgba(0,200,150,.1);color:var(--green)}
.nbear{background:rgba(255,92,92,.1);color:var(--red)}
.nneut{background:rgba(255,255,255,.06);color:var(--text3)}
.news-item{padding:8px 0;border-bottom:.5px solid var(--border)}
.news-item:last-child{border-bottom:none}
.news-meta{display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap}
.ntag{font-size:10px;font-weight:600;padding:2px 5px;border-radius:4px;background:rgba(74,158,255,.1);color:var(--blue)}
.nsent{font-size:10px;padding:2px 5px;border-radius:4px;font-weight:600}
.sent-bullish{background:rgba(0,200,150,.1);color:var(--green)}
.sent-bearish{background:rgba(255,92,92,.1);color:var(--red)}
.sent-neutral{background:rgba(255,255,255,.06);color:var(--text3)}
.nsrc{font-size:10px;color:var(--text3)}
.ntext{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:3px}
.nlink{font-size:11px;color:var(--blue);text-decoration:none}

/* ─ Settings panel ─ */
.pov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;backdrop-filter:blur(4px)}
.pov.open{display:block}
.panel{position:fixed;bottom:-100%;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;z-index:201;
  padding:0 16px calc(env(safe-area-inset-bottom,0px) + 24px);transition:bottom .3s cubic-bezier(.4,0,.2,1);max-height:85vh;overflow-y:auto}
.panel.open{bottom:0}
.pdrag{width:44px;height:5px;background:var(--bg4);border-radius:3px;margin:10px auto 14px;cursor:pointer;transition:background .2s}
.pdrag:hover,.pdrag:active{background:var(--text3)}
.ptitle{font-size:15px;font-weight:700;margin-bottom:3px}
.psub{font-size:12px;color:var(--text3);margin-bottom:14px}
.wgt{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.8px;margin-bottom:7px}
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.wbtn{padding:11px 8px;border-radius:10px;border:.5px solid var(--border2);background:var(--bg3);cursor:pointer;text-align:left;transition:all .15s}
.wbtn.active{border-color:var(--green);background:rgba(0,200,150,.05)}
.wlbl{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.wsub{font-size:10px;color:var(--text3);line-height:1.5}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ebtn{padding:10px 6px;border-radius:10px;border:.5px solid var(--border);background:var(--bg3);color:var(--text3);cursor:pointer;font-size:12px;font-weight:600;text-align:center;transition:all .15s}
.ebtn.active{border-color:var(--blue);color:var(--blue);background:rgba(74,158,255,.06)}



/* ─ Chips modal ─ */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;backdrop-filter:blur(4px)}
.mov.open{display:block}
.modal{position:fixed;bottom:-100%;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;z-index:301;
  padding:0 16px calc(env(safe-area-inset-bottom,0px) + 32px);transition:bottom .3s cubic-bezier(.4,0,.2,1);max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.modal.open{bottom:0}
.mdrag{width:44px;height:5px;background:var(--bg4);border-radius:3px;margin:10px auto 14px;cursor:pointer;transition:background .2s}
.mdrag:hover,.mdrag:active{background:var(--text3)}
.mtitle{font-size:16px;font-weight:700;margin-bottom:3px}
.msub{font-size:12px;color:var(--text3);margin-bottom:14px}
.sum3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.sbox{background:var(--bg3);border-radius:10px;padding:9px 5px;text-align:center}
.slbl{font-size:10px;color:var(--text3);margin-bottom:3px}
.sval{font-size:14px;font-weight:700}
.ssub{font-size:10px;color:var(--text3);margin-top:2px}
.bsec{margin-bottom:14px}
.btitle{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.7px;margin-bottom:9px}
.brow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.bname{font-size:12px;color:var(--text2);width:40px;flex-shrink:0}
.btrack{flex:1;height:7px;background:var(--bg4);border-radius:4px;overflow:hidden}
.bfill{height:100%;border-radius:4px}
.bfill.buy{background:var(--green)}.bfill.sell{background:var(--red)}
.bpct{font-size:11px;font-weight:700;width:52px;text-align:right;flex-shrink:0}
.dtitle{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.7px;margin-bottom:9px}
.dtbl{width:100%;border-collapse:collapse}
.dtbl th{font-size:10px;color:var(--text3);font-weight:600;padding:4px 3px;text-align:right;border-bottom:.5px solid var(--border)}
.dtbl th:first-child{text-align:left}
.dtbl td{font-size:12px;padding:7px 3px;text-align:right;border-bottom:.5px solid var(--border)}
.dtbl td:first-child{text-align:left;color:var(--text3)}
.dtbl tr:last-child td{border-bottom:none}
.nup{color:var(--green);font-weight:600}.ndn{color:var(--red);font-weight:600}.nfl{color:var(--text3)}

/* ─ Status ─ */
.status{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--text3);font-size:14px}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;line-height:2.2}

.lend-sec{margin-top:14px}
.lend-card{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:10px 14px;cursor:pointer}
.lend-badge{font-size:10px;font-weight:700;background:rgba(239,68,68,.12);color:var(--red);padding:2px 8px;border-radius:20px}
.lend-expand{display:none;margin-top:8px;padding-top:8px;border-top:.5px solid rgba(239,68,68,.2)}
.lend-expand.open{display:block}
.lend-spark-title{font-size:10px;color:var(--text3);margin-bottom:4px}

/* ─ 主頁三入口 ─ */
.home-wrap{padding:12px 12px 0;display:flex;flex-direction:column;gap:10px}
.entry-card{border-radius:16px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent}
.entry-card:active{transform:scale(.985)}
.ec-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px}
.ec-icon{font-size:28px;flex-shrink:0}
.ec-info{flex:1}
.ec-title{font-size:17px;font-weight:800;margin-bottom:2px}
.ec-sub{font-size:12px;color:var(--text3)}
.ec-arr{font-size:16px;color:var(--text3)}
.ec-body{padding:0 16px 14px;display:flex;gap:8px;flex-wrap:wrap}
.ec-stat{background:var(--bg3);border-radius:10px;padding:8px 10px;flex:1;min-width:80px}
.ec-stat-lbl{font-size:10px;color:var(--text3);margin-bottom:3px}
.ec-stat-val{font-size:14px;font-weight:700}

/* ─ 整體經濟卡片 ─ */
.ec-macro{background:linear-gradient(135deg,#12121a,#1a1a2e)}
/* ─ ETF 卡片 ─ */
.ec-etf{background:linear-gradient(135deg,#0f1a0f,#1a2a1a)}
/* ─ 個股卡片 ─ */
.ec-stocks{background:linear-gradient(135deg,#12121a,#1a1220)}

/* ─ 共振預警 ─ */
.res-badge{display:inline-block;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:10px;margin-left:4px;animation:rpulse 1.5s infinite;vertical-align:middle}
@keyframes rpulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <button id="hdr-back" onclick="goView('home')" style="display:none;background:none;border:none;color:var(--text);font-size:18px;cursor:pointer;padding:0 8px 0 0">‹</button>

  <div class="tabs">

  <div class="pdrag"></div>

    <button class="wbtn" id="w-chips" onclick="setW('chips')"><div class="wlbl">🏦 籌碼優先</div><div class="wsub">籌碼50 基本15 技術10<br>量能15 營5 RS5</div></button>

    <button class="wbtn" id="w-momentum" onclick="setW('momentum')"><div class="wlbl">📊 動能優先</div><div class="wsub">籌碼20 基本10 技術25<br>量能35 營5 RS5</div></button>
  </div>
  <div class="wgt">極端模式</div>
  <div class="egrid">
    <button class="ebtn" id="w-pure-chips"  onclick="setW('pure-chips')">純籌碼 100%</button>
    <button class="ebtn" id="w-pure-fund"   onclick="setW('pure-fund')">純基本面 100%</button>

<script>
var stocks=[],etfs=[],curSort='score',curTab='all',curInd='all',curThm='all',curSectorKey='all',
    curFMode='ind',curW='default',openCards={},cardTabs={};
var curView='home';  // home / macro / etf / stocks
var bizCycle={light:'green',label:'載入中...'};  // 景氣燈號資料（預設值防止 undefined）
var sectorData={};   // 產業輪動資料
var wl=[];try{wl=JSON.parse(localStorage.getItem('wl')||'[]');}catch(e){}
// iOS Safari PWA 相對 URL 需轉成絕對路徑，否則拋出 "The string did not match the expected pattern."
var _pageBase=(function(){var h=location.href.split('?')[0];return h.endsWith('/')?h:h.replace(/\/[^/]*$/,'/');}());
function stocksUrl(){return _pageBase+'stocks.json?t='+Date.now();}

var IND_S={'半導體業':'半導體','電腦及週邊設備業':'電腦週邊','光電業':'光電','其他電子業':'其他電子',
  '電子零組件業':'電子零組件','通信網路業':'通訊網路','電子通路業':'電子通路','資訊服務業':'資訊服務',
  '電機機械':'電機','金融業':'金融','銀行業':'銀行','保險業':'保險','證券業':'證券',
  '鋼鐵工業':'鋼鐵','航運業':'航運','塑膠工業':'塑膠','化學工業':'化學','食品工業':'食品',
  '紡織纖維':'紡織','建材營造':'建材','貿易百貨':'貿易','油電燃氣業':'油電','生技醫療業':'生技醫療','觀光餐旅':'觀光'};

var WS={
  'default'  :{c:.30,f:.25,tech:.15,r:.10,v:.15,s:.05,t:.00},
  'chips'    :{c:.50,f:.15,tech:.10,r:.05,v:.15,s:.05,t:.00},
  'value'    :{c:.15,f:.40,tech:.10,r:.15,v:.15,s:.05,t:.00},
  'momentum' :{c:.20,f:.10,tech:.25,r:.05,v:.35,s:.05,t:.00},
  'pure-chips':{c:1,f:0,tech:0,r:0,v:0,s:0,t:0},
  'pure-fund' :{c:0,f:1,tech:0,r:0,v:0,s:0,t:0},
  'pure-tech' :{c:0,f:0,tech:1,r:0,v:0,s:0,t:0},
  'pure-vol'  :{c:0,f:0,tech:0,r:0,v:1,s:0,t:0}
};

// ── View 切換 ────────────────────────────────────────────
function goView(v){
  curView=v;
  var views=['home','macro','etf','stocks'];
  views.forEach(function(id){
    var el=document.getElementById(id+'-view');
    if(el) el.style.display=(id===v)?'':'none';
  });
  // header 返回按鈕
  var hdr=document.getElementById('hdr-back');
  if(hdr) hdr.style.display=(v==='home')?'none':'';
  var title=document.getElementById('hdr-title');
  if(title) title.textContent=v==='home'?'選股雷達 📡':v==='macro'?'整體經濟':v==='etf'?'ETF 防禦參考':'個股選股雷達';
  if(v==='home') renderHomeCards();
  if(v==='etf')  renderETF();
  if(v==='macro') renderMacroFull();
}

function renderHomeCards(){
  // 個股摘要
  var sub=document.getElementById('stocks-sub');
  if(sub) sub.textContent='共 '+stocks.length+' 檔個股';
  // ETF 摘要
  var esub=document.getElementById('etf-sub');
  if(esub) esub.textContent='共 '+etfs.length+' 檔 ETF';
  // 景氣燈號顯示在入口卡片副標
  var msub=document.getElementById('macro-ec-sub');
  if(msub&&bizCycle.label) msub.textContent=bizCycle.label+' | 外資期貨'+(window._foiData?(window._foiData.net>0?' 偏多':' 偏空'):'');
}

function renderMacroPreview(){
  // 更新整體經濟入口卡副標
  var msub=document.getElementById('macro-ec-sub');
  if(!msub) return;
  var lc={red:'#ef4444',yellow:'#f59e0b',green:'#22c55e',yellow_blue:'#60a5fa',blue:'#3b82f6'};
  var col=lc[bizCycle.light]||'#9ca3af';
  var txt=bizCycle.label||'景氣燈號・期貨外資・大盤狀態';
  if(window._foiData) txt+=(window._foiData.net>0?' | 期貨外資偏多':' | 期貨外資偏空');
  msub.innerHTML='<span style="color:'+col+';font-weight:600">'+txt+'</span>';
}

function renderMacroFull(){
  var el=document.getElementById('macro-content');
  if(!el) return;
  var lc={red:'#ef4444',yellow:'#f59e0b',green:'#22c55e',yellow_blue:'#60a5fa',blue:'#3b82f6'};
  var col=lc[bizCycle.light]||'#9ca3af';
  var h='';
  // 景氣燈號大卡
  h+='<div style="background:var(--bg2);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:10px">'+
    '<div style="font-size:12px;color:var(--text3);margin-bottom:6px;font-weight:600;letter-spacing:.5px">景氣信號燈</div>'+
    '<div style="font-size:22px;font-weight:800;color:'+col+'">'+bizCycle.label+'</div>'+
    (bizCycle.score?'<div style="font-size:12px;color:var(--text3);margin-top:4px">綜合分數 '+bizCycle.score+' 分 | 資料來源：國發會</div>':'')+
    '<div style="margin-top:12px;font-size:12px;color:var(--text2);line-height:1.8">'+
      (bizCycle.light==='blue'||bizCycle.light==='yellow_blue'
        ?'🔵 復甦訊號：此階段可提高權益部位，關注轉強期產業'
        :bizCycle.light==='red'?'🔴 過熱訊號：注意風險，控制倉位'
        :'🟢 景氣穩健運行中')+
    '</div>'+
  '</div>';
  // 期貨外資
  if(window._foiData){
    var d=window._foiData;
    var nc=d.net>0?'var(--red)':'var(--green)';
    h+='<div style="background:var(--bg2);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:10px">'+
      '<div style="font-size:12px;color:var(--text3);margin-bottom:8px;font-weight:600;letter-spacing:.5px">外資期貨未平倉</div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'+
        '<div style="background:var(--bg3);border-radius:10px;padding:10px;text-align:center">'+
          '<div style="font-size:10px;color:var(--text3);margin-bottom:3px">多單</div>'+
          '<div style="font-size:15px;font-weight:700;color:var(--red)">'+d.long.toLocaleString()+'</div>'+
        '</div>'+
        '<div style="background:var(--bg3);border-radius:10px;padding:10px;text-align:center">'+
          '<div style="font-size:10px;color:var(--text3);margin-bottom:3px">空單</div>'+
          '<div style="font-size:15px;font-weight:700;color:var(--green)">'+d.short.toLocaleString()+'</div>'+
        '</div>'+
        '<div style="background:var(--bg3);border-radius:10px;padding:10px;text-align:center">'+
          '<div style="font-size:10px;color:var(--text3);margin-bottom:3px">淨部位</div>'+
          '<div style="font-size:15px;font-weight:700;color:'+nc+'">'+(d.net>0?'+':'')+d.net.toLocaleString()+'</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }
  // 產業輪動地圖
  var sdKeys=Object.keys(sectorData);
  if(sdKeys.length){
    var phases={
      '準備噴':{label:'準備噴 🔵',color:'#3b82f6',bg:'rgba(59,130,246,.07)',border:'rgba(59,130,246,.25)',desc:'RS>0 M>1 A>0 剛翻強'},
      '主升段':{label:'主升段 🟢',color:'#22c55e',bg:'rgba(34,197,94,.07)',border:'rgba(34,197,94,.25)',desc:'RS高 M>1.2 A≥0 強趨勢'},
      '高檔震盪':{label:'高檔震盪 🟡',color:'#f59e0b',bg:'rgba(245,158,11,.07)',border:'rgba(245,158,11,.25)',desc:'RS高但不創高 M<1 A<0'},
      '空頭':{label:'空頭 🔴',color:'#ef4444',bg:'rgba(239,68,68,.07)',border:'rgba(239,68,68,.25)',desc:'RS<0 M<1 A<0'}
    };
    var groups={'準備噴':[],'主升段':[],'高檔震盪':[],'空頭':[]};
    sdKeys.forEach(function(name){
      var d=sectorData[name];
      var sp=d&&d.sub_phase;
      if(sp&&groups[sp]) groups[sp].push({name:name,rs:d.rs,rs_mom:d.rs_mom,sub_phase:sp,acceleration:d.acceleration||0,rs_up_days:d.rs_up_days||0,vector:d.vector||{},trend:d.trend||[]});
    });
    h+='<div style="background:var(--bg2);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:10px">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
        '<div style="font-size:12px;color:var(--text3);font-weight:600;letter-spacing:.5px">🗺️ 產業輪動地圖</div>'+
        '<button id="sector-togall-btn" onclick="togAllSectors(this)" style="background:var(--bg4);border:.5px solid var(--border2);color:var(--text2);font-size:10px;padding:3px 9px;border-radius:8px;cursor:pointer">展開全部</button>'+
      '</div>'+
      '<div style="display:flex;flex-direction:column;gap:8px">';
    ['準備噴','主升段','高檔震盪','空頭'].forEach(function(ph){
      var p=phases[ph],list=groups[ph]||[];
      list.sort(function(a,b){return b.rs_mom-a.rs_mom;});
      // 每個象限：左側標籤 + 右側產業小卡片橫向排列
      h+='<div style="display:flex;align-items:flex-start;gap:8px">'+
        '<div style="flex-shrink:0;width:52px;background:'+p.bg+';border:1px solid '+p.border+';border-radius:8px;padding:6px 4px;text-align:center;align-self:flex-start">'+
          '<div style="color:'+p.color+';font-weight:700;font-size:11px;line-height:1.3">'+ph+'</div>'+
        '</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:4px;flex:1">';
      list.forEach(function(s,idx){
        var accel=s.acceleration||0;
        var accArr=accel>0.05?'▲':accel<-0.05?'▼':'─';
        var accColor=accel>0.05?'#22c55e':accel<-0.05?'#ef4444':'#9ca3af';
        var tid='sqc'+ph+idx;
        // 固定寬度小卡片：產業名（截短）+ M值 + 加速箭頭
        h+='<div style="width:66px;flex-shrink:0;background:var(--bg);border:1px solid '+p.border+';border-radius:7px;overflow:hidden">'+
          '<div data-tid="'+tid+'" onclick="togSector(this)" style="cursor:pointer;padding:4px 5px">'+
            '<div style="font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)">'+s.name+'</div>'+
            '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px">'+

function _renderSectorChart(el){
  if(el.dataset.rendered) return;
  try{
    var trend=JSON.parse(decodeURIComponent(el.getAttribute('data-trend')||'%5B%5D'));
    var color=el.getAttribute('data-color')||'#22c55e';
    el.innerHTML=drawSparkline(trend,color);
    var sk=el.getAttribute('data-sector')||'';
    if(sk){
      el.innerHTML+='<div style="font-size:9px;color:var(--blue);text-align:center;padding:1px 0 3px;cursor:pointer">→ 點此查看'+sk+'個股</div>';
      el.style.cursor='pointer';
      el.onclick=function(e){e.stopPropagation();jumpToSector(sk);};
    }
    el.dataset.rendered='1';
  }catch(e){}
}

function drawSparkline(trend,color){
  if(!trend||trend.length<2)return '<div style="font-size:10px;color:var(--text3);padding:4px">資料不足</div>';
  var vals=trend.map(function(t){return t.rs;});
  var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),range=mx-mn||0.1;
  var W=240,H=52,P=6;
  var pts=vals.map(function(v,i){
    return (P+(W-P*2)/(vals.length-1)*i).toFixed(1)+','+(H-P-(v-mn)/range*(H-P*2)).toFixed(1);
  }).join(' ');
  var last=vals[vals.length-1],first=vals[0];
  var chg=((last-first)/Math.abs(first)*100).toFixed(1);
  var cc=last>=first?'#22c55e':'#ef4444';
  var y100=(mn<=100&&mx>=100)?(H-P-(100-mn)/range*(H-P*2)).toFixed(1):null;
  var base=y100?'<line x1="'+P+'" y1="'+y100+'" x2="'+(W-P)+'" y2="'+y100+'" stroke="#ffffff20" stroke-width="1" stroke-dasharray="3,2"/>':'';
  var lx=(P+(W-P*2)/(vals.length-1)*(vals.length-1)).toFixed(1);
  var ly=(H-P-(last-mn)/range*(H-P*2)).toFixed(1);
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:52px;display:block">'+base+
    '<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round"/>'+
    '<circle cx="'+lx+'" cy="'+ly+'" r="3.5" fill="'+color+'"/>'+
    '</svg>'+
    '<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);padding:2px 4px 0">'+
      '<span>'+(trend[0].date||'')+'</span>'+
      '<span style="color:'+cc+';font-weight:700">'+(chg>0?'+':'')+chg+'%</span>'+
      '<span>'+(trend[trend.length-1].date||'')+'</span>'+
    '</div>';
}

// Industry ranks
var rankMap={};


function calcRanks(){
  rankMap={};
  var grps={};
  stocks.forEach(function(s){var ind=s.industry||'其他';if(!grps[ind])grps[ind]=[];grps[ind].push(s);});
  Object.keys(grps).forEach(function(ind){
    var g=grps[ind].slice().sort(function(a,b){return sc(b)-sc(a);});
    g.forEach(function(s,i){rankMap[s.code]={rank:i+1,total:g.length,ind:ind};});
  });
}

function render(){
  var q=(document.getElementById('search')||{}).value||'';
  var list=stocks.slice();
  if(curTab==='large')     list=list.filter(function(s){return s.category==='large';});
  else if(curTab==='mid_small') list=list.filter(function(s){return s.category==='mid_small';});
  else if(curTab==='watch') list=list.filter(function(s){return wl.indexOf(s.code)>=0;});
  if(curInd!=='all') list=list.filter(function(s){return s.industry===curInd;});
  if(curSectorKey!=='all') list=list.filter(function(s){return s.sector_key===curSectorKey;});
  if(curThm!=='all') list=list.filter(function(s){return(s.themes||[]).indexOf(curThm)>=0;});
  if(filterMA60) list=list.filter(function(s){return s.above_ma60===true;});
  if(q) list=list.filter(function(s){return s.code.indexOf(q)>=0||s.name.indexOf(q)>=0;});

  calcRanks();

  list.sort(function(a,b){
    if(curSort==='score')return sc(b)-sc(a);
    if(curSort==='cd')return b.change_pct-a.change_pct;
    if(curSort==='ca')return a.change_pct-b.change_pct;
    if(curSort==='pd')return b.price-a.price;
    if(curSort==='pa')return a.price-b.price;
    if(curSort==='vol')return(b.vol_month_ratio||0)-(a.vol_month_ratio||0);
    return 0;
  });

  var app=document.getElementById('app');
  if(!list.length){app.innerHTML='<div class="empty">沒有符合條件的股票</div>';return;}
  app.innerHTML=list.map(rCard).join('');
}

    sectorPhaseHtml='<span style="display:inline-block;margin-top:3px;font-size:9px;background:'+_spbg+';padding:1px 6px;border-radius:4px;white-space:nowrap">'+
      _sp+' <span style="color:'+_arc+';font-weight:700">'+_arr+'</span>'+

    // 雷達圖

    function radarSvg(sc){
      var dims=['籌碼','基本面','技術面','量能','月營收','RS'],vals=[sc.chips||0,sc.fundamental||0,sc.technical||0,sc.volume||0,sc.revenue||0,sc.rs||0];
      var cx=65,cy=65,r=42,n=5,W=130,H=130;
      var svg='<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">';
      // 背景網格
      [0.25,0.5,0.75,1].forEach(function(ratio){
        var gp=Array.from({length:n},function(_,i){
          var a=Math.PI*2/n*i-Math.PI/2;
          return (cx+r*ratio*Math.cos(a)).toFixed(1)+','+(cy+r*ratio*Math.sin(a)).toFixed(1);
        });
        svg+='<polygon points="'+gp.join(' ')+'" fill="none" stroke="var(--bg4)" stroke-width="0.8"/>';
      });
      // 軸線和 label
      for(var i=0;i<n;i++){
        var a=Math.PI*2/n*i-Math.PI/2;
        svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a)).toFixed(1)+'" y2="'+(cy+r*Math.sin(a)).toFixed(1)+'" stroke="var(--bg4)" stroke-width="0.8"/>';
        // label 往外推多一點，避免跟數值重疊
        var lx=(cx+(r+16)*Math.cos(a)).toFixed(1);
        var ly=(cy+(r+16)*Math.sin(a)).toFixed(1);
        svg+='<text x="'+lx+'" y="'+ly+'" text-anchor="middle" dominant-baseline="middle" font-size="7.5" fill="var(--text3)">'+dims[i]+'</text>';
      }
      // 數據多邊形
      var shpts=vals.map(function(v,i){
        var a=Math.PI*2/n*i-Math.PI/2,rv=r*(v/100);
        return (cx+rv*Math.cos(a)).toFixed(1)+','+(cy+rv*Math.sin(a)).toFixed(1);
      });
      svg+='<polygon points="'+shpts.join(' ')+'" fill="rgba(59,130,246,0.2)" stroke="var(--blue)" stroke-width="1.5"/>';
      return svg+'</svg>';
    }
    // 評分明細說明
    function pillDesc(lbl,val,desc){
      var safe=desc.replace(/"/g,'&quot;');
      var bg=val>=70?'rgba(0,200,150,.12)':val>=50?'rgba(255,159,67,.12)':'rgba(255,92,92,.10)';
      var fc=val>=70?'var(--green)':val>=50?'var(--orange)':'var(--red)';

    var pills=pillDesc('籌',sp.chips||0,chipDesc.join('　')||'無籌碼資料')+

              pillDesc('量',sp.volume||0,volDesc)+
              pillDesc('RS',sp.rs||0,'RS相對強度 '+(s.yahoo_rs!=null?(s.yahoo_rs>0?'+':'')+Math.round(s.yahoo_rs*100)+'%':'計算中'));

    detail='<div class="detail">'+
      wbar+
      '<div class="price-row">'+
        '<div><div class="price-big '+cls+'">$'+Number(s.price).toLocaleString()+'</div>'+
        '<div class="price-sub '+cls+'">'+sg+s.change+' ('+sg+s.change_pct+'%)</div>'+
        '<div style="margin-top:6px">'+radarSvg(sp)+'</div></div>'+
        '<div class="score-detail">'+
          '<div class="score-total" style="color:'+col+'">'+ws+'</div>'+
          '<div class="score-sub">/ 100 綜合評分</div>'+

          (function(){
            var sh=s.score_history;

            var sc=sh.slice(0,7).reverse().map(function(h){return h.score;});
            var mx=Math.max.apply(null,sc)||1,mn=Math.max(0,Math.min.apply(null,sc)-5);
            var W=110,H=26,P=3;
            var pts=sc.map(function(v,i){
              return (P+(W-P*2)/(sc.length-1||1)*i).toFixed(1)+','+(H-P-(v-mn)/((mx-mn)||1)*(H-P*2)).toFixed(1);

            var last=sc[sc.length-1];

            return '<svg viewBox="0 0 '+W+' '+H+'" style="width:110px;height:26px;margin-top:3px">'+

            '</svg>';

      '</div>'+

function rChips(s){
  var chips=s.chips||[];
  if(!chips.length)return '<div style="font-size:13px;color:var(--text3)">數據更新中</div>';
  var rows=chips.map(function(c){
    var net=c.net||0,con=c.consecutive||0;
    var ct=con>0?'連買'+con+'日':con<0?'連賣'+Math.abs(con)+'日':'持平';
    // 佔流通股本比例（更公平比較大小型股）
    var shares_lots=(s.chips_raw&&s.chips_raw.shares_outstanding)?Math.round(s.chips_raw.shares_outstanding/1000):0;
    var vol_lots=s.volume?Math.round(s.volume/1000):0;
    // 優先用佔股本比例，無資料才用佔成交量
    var pctVal=0;
    if(shares_lots>0) pctVal=parseFloat((Math.abs(net)/shares_lots*100).toFixed(3));
    else if(vol_lots>0) pctVal=Math.round(Math.abs(net)/vol_lots*100);
    var pct=pctVal>0&&pctVal<100?' ('+pctVal+'%)':''
    var nc2=net>0?'nup':net<0?'ndn':'nfl';
    return '<div class="chip-row">'+
      '<div class="chip-label"><span class="cbadge '+(c.pass?'pass':'fail')+'">'+(c.pass?'✓':'✗')+'</span>'+c.label+'</div>'+
      '<div class="chip-right"><div class="chip-con">'+ct+'</div><div class="chip-net '+nc2+'">'+sgn(net)+net.toLocaleString()+'張<span style="font-size:10px;color:var(--text3)">'+pct+'</span></div></div>'+
    '</div>';
  }).join('');
  return rows+'<button class="chip-detail-btn" onclick="openCM(\''+s.code+'\',event)">📊 查看詳細籌碼分析 →</button>';
}
function rFund(s){
  var rows=s.fundamental||[],fp=s.fair_price;
  var fh=rows.length?rows.map(function(r){
    return '<div class="check-row"><span class="chk-label">'+r.label+'</span>'+
      '<span class="chk-val"><span class="badge '+(r.pass?'pass':'fail')+'">'+(r.pass?'✓':'✗')+'</span>'+r.value+'</span></div>';
  }).join(''):'<div style="font-size:13px;color:var(--text3)">數據更新中</div>';
  var fairh='';
  if(fp&&fp.fair){
    var cur=Number(s.price);
    var sig=cur<fp.conservative?'<span style="color:var(--green);font-weight:700">低估 ✓</span>':cur>fp.optimistic?'<span style="color:var(--red);font-weight:700">偏貴 ✗</span>':'<span style="color:var(--gold);font-weight:700">合理區間</span>';

    // 交集區間
    var intersect='<div class="fair-sec">'+
      '<div class="fair-title">💎 三法估值交集區間</div>'+
      '<div class="fair-grid">'+
        '<div class="fair-box"><div class="fair-lbl">保守下限</div><div class="fair-val fc">$'+(fp.conservative||'N/A')+'</div></div>'+
        '<div class="fair-box"><div class="fair-lbl">合理均值</div><div class="fair-val ff">$'+(fp.fair||'N/A')+'</div></div>'+
        '<div class="fair-box"><div class="fair-lbl">樂觀上限</div><div class="fair-val fo">$'+(fp.optimistic||'N/A')+'</div></div>'+
      '</div>'+
      '<div class="fair-cur">目前 $'+cur.toLocaleString()+'　EPS '+(s.eps_ttm||'N/A')+'　'+sig+'</div>'+
    '</div>';

    // 各法明細
    var methods=fp.methods||[];
    var mrows=methods.map(function(m){
      return '<div class="method-row">'+
        '<span class="method-lbl">'+m.label+'</span>'+
        '<span class="method-range">$'+m.conservative+' ~ $'+m.optimistic+'</span>'+
        '<span class="method-fair">合理 $'+m.fair+'</span>'+
      '</div>';
    }).join('');
    var mblock=mrows?'<div class="method-block">'+mrows+'</div>':'';

    fairh=intersect+mblock;
  }
  return fh+fairh;
}
function rVol(s){
  var mr=s.vol_month_ratio||0,dr=s.vol_day_ratio||0;
  var mc=mr>1.5?'var(--green)':mr>1?'var(--orange)':'var(--text2)';
  var dc=dr>2?'var(--orange)':'var(--text2)';
  // vol20/vol60 第三格
  var v20=s.vol20_avg,v60=s.vol60_avg,vr20h='';
  if(v20&&v60){
    var vr=v20/v60,vrC=vr>1.5?'var(--green)':vr>1.0?'var(--orange)':'var(--text2)';
    vr20h='<div class="vol-box"><div class="vol-lbl">量能比<br>20日 vs 60日</div><div class="vol-val" style="color:'+vrC+'">'+vr.toFixed(2)+'x</div></div>';
  }
  // 三格量能（固定 repeat(3,1fr)）
  var vh='<div class="vol-grid" style="grid-template-columns:repeat(3,1fr)">'+
    '<div class="vol-box"><div class="vol-lbl">月量比<br>近20日 vs 前3月</div><div class="vol-val" style="color:'+mc+'">'+mr.toFixed(2)+'x</div></div>'+
    '<div class="vol-box"><div class="vol-lbl">日量比<br>今日 vs 均量</div><div class="vol-val" style="color:'+dc+'">'+dr.toFixed(2)+'x'+(dr>=2?' 🔥':'')+'</div></div>'+
    vr20h+
  '</div>';
  // 52週區間進度條
  var rh='';
  if(s.week52_high&&s.week52_low){
    var pos=s.week52_high===s.week52_low?50:Math.round((s.price-s.week52_low)/(s.week52_high-s.week52_low)*100);
    rh='<div class="range-sec"><div class="range-lbl">52週區間位置 <strong style="color:var(--text2)">'+pos+'%</strong></div>'+
      '<div class="range-wrap">'+
        '<span class="range-end">$'+s.week52_low.toLocaleString()+'</span>'+
        '<div class="range-bar"><div class="range-fill"></div><div class="range-dot" style="left:'+pos+'%"></div></div>'+
        '<span class="range-end">$'+s.week52_high.toLocaleString()+'</span>'+
      '</div></div>';
  }
  // 技術面三指標
  var th='';
  if(s.week52_high&&s.week52_low&&s.price){
    var w52h=s.week52_high,w52l=s.week52_low,pr=s.price;
    var ratio=pr/w52h,drawdown=(w52h-pr)/w52h,vol52=(w52h-w52l)/w52l;
    var ratioC=ratio>=1.0?'var(--green)':ratio>=0.85?'var(--orange)':'var(--text2)';
    var ddC=drawdown<0.10?'var(--green)':drawdown<0.20?'var(--orange)':drawdown>0.50?'var(--red)':'var(--text2)';
    var vC=vol52>1.0?'var(--green)':vol52>0.6?'var(--orange)':'var(--text2)';
    var techScore=s.scores&&s.scores.technical||0;
    var techC=techScore>=70?'var(--green)':techScore>=40?'var(--orange)':'var(--red)';
    th='<div class="tech-sec">'+
      '<div class="tech-title">📐 技術面分析 <span style="color:'+techC+';font-weight:800">'+techScore+'分</span></div>'+
      '<div class="tech-grid">'+
        '<div class="tech-box"><div class="tech-lbl">52週突破強度</div>'+
          '<div class="tech-val" style="color:'+ratioC+'">'+Math.round(ratio*100)+'%</div>'+
          '<div class="tech-sub">'+(ratio>=1.0?'✅ 突破高點':ratio>=0.95?'接近突破':ratio>=0.85?'高檔整理':'距高點遠')+'</div></div>'+
        '<div class="tech-box"><div class="tech-lbl">52週回撤</div>'+
          '<div class="tech-val" style="color:'+ddC+'">-'+Math.round(drawdown*100)+'%</div>'+
          '<div class="tech-sub">'+(drawdown<0.10?'✅ 強勢':drawdown<0.20?'正常':drawdown>0.50?'❌ 深度回撤':'中度回撤')+'</div></div>'+
        '<div class="tech-box"><div class="tech-lbl">52週波動率</div>'+
          '<div class="tech-val" style="color:'+vC+'">'+Math.round(vol52*100)+'%</div>'+
          '<div class="tech-sub">'+(vol52>1.5?'高動能':vol52>1.0?'中高動能':vol52>0.6?'中等':'低波動')+'</div></div>'+
      '</div>'+
      (s.ma60?'<div class="ma60-row"><span class="ma60-lbl">MA60</span><span class="ma60-val">$'+s.ma60.toFixed(1)+'</span><span class="ma60-badge '+(s.above_ma60?'pass':'fail')+'">'+(s.above_ma60?'✅ 站上':'⚠️ 跌破')+'</span></div>':'')+
    '</div>';
  }
  return vh+rh+th;
}
function rNews(news){
  if(!news||!news.length)return '<div style="font-size:13px;color:var(--text3)">暫無相關新聞</div>';
  var bull=0,bear=0,neut=0;
  news.forEach(function(n){if(n.sentiment==='bullish')bull++;else if(n.sentiment==='bearish')bear++;else neut++;});
  var sm='<div class="news-summary">'+
    (bull?'<span class="npill nbull">📈 利多 '+bull+'</span>':'')+
    (bear?'<span class="npill nbear">📉 利空 '+bear+'</span>':'')+
    (neut?'<span class="npill nneut">➖ 中立 '+neut+'</span>':'')+
  '</div>';
  var it=news.map(function(n){
    var sc2=n.sentiment||'neutral',st=sc2==='bullish'?'利多':sc2==='bearish'?'利空':'中立';
    var lk=n.url&&n.url!=='#'?'<a class="nlink" href="'+n.url+'" target="_blank">閱讀原文 →</a>':'';
    return '<div class="news-item">'+
      '<div class="news-meta"><span class="ntag">'+(n.tag||'新聞')+'</span><span class="nsent sent-'+sc2+'">'+st+'</span><span class="nsrc">'+(n.source||'')+'</span></div>'+
      '<div class="ntext">'+(n.title||'')+'</div>'+lk+
    '</div>';
  }).join('');
  return sm+it;
}

function rSignals(s){
  var sigs=s.signals||[];
  if(!sigs.length)return '<div style="font-size:13px;color:var(--text3);text-align:center;padding:18px 0">目前無符合條件的買點訊號</div>';
  var LABELS={'strong':'強','medium':'中','weak':'弱'};
  var cards=sigs.map(function(sg){
    var st=sg.strength||'medium';
    var stLbl=LABELS[st]||st;
    return '<div class="sig-card '+st+'">'+
      '<div class="sig-head">'+
        '<span class="sig-badge '+st+'">'+stLbl+'</span>'+
        '<span class="sig-label">'+sg.label+'</span>'+
      '</div>'+
      '<div class="sig-reason">'+sg.reason+'</div>'+
      '<div class="sig-prices">'+
        '<div class="sig-px">進場 <span>$'+sg.entry+'</span></div>'+
        '<div class="sig-px">停損 <span style="color:var(--red)">$'+sg.stop_loss+'</span></div>'+
        '<div class="sig-px">目標 <span style="color:var(--green)">$'+sg.target+'</span></div>'+
        '<div class="sig-px">RR <span>1:'+sg.rr+'</span></div>'+
      '</div>'+
    '</div>';
  }).join('');
  return '<div class="sig-list">'+cards+'</div>';
}

// ─ Filter ─
function openFilter(mode){
  var dd=document.getElementById('fdd'),ov=document.getElementById('fov');
  var isOpen=dd.classList.contains('open');
  if(isOpen&&curFMode===mode){closeFilter();return;}
  curFMode=mode;
  document.getElementById('fdd-title').textContent=mode==='ind'?'選擇產業類別':'選擇概念題材';
  buildFGrid(mode);
  dd.classList.add('open');ov.classList.add('open');
}
function closeFilter(){
  document.getElementById('fdd').classList.remove('open');
  document.getElementById('fov').classList.remove('open');
}
function buildFGrid(mode){
  var g=document.getElementById('fgrid');
  if(mode==='ind'){
    var cnt={};stocks.forEach(function(s){var ind=s.industry||'其他';cnt[ind]=(cnt[ind]||0)+1;});
    var sr=Object.entries(cnt).sort(function(a,b){return b[1]-a[1];});
    var h='<button class="fi fi-all'+(curInd==='all'?' active':'')+'" onclick="setInd(\'all\')">全部產業<span class="fi-cnt">'+stocks.length+'</span></button>';
    sr.forEach(function(e){var ind=e[0],c=e[1],lb=IND_S[ind]||ind.replace('業','').replace('工業','');
      h+='<button class="fi'+(curInd===ind?' active':'')+'" onclick="setInd(\''+ind+'\')">'+lb+'<span class="fi-cnt">'+c+'</span></button>';});
    g.innerHTML=h;
  } else {
    var cnt={};stocks.forEach(function(s){(s.themes||[]).forEach(function(t){cnt[t]=(cnt[t]||0)+1;});});
    var sr=Object.entries(cnt).sort(function(a,b){return b[1]-a[1];});
    if(!sr.length){g.innerHTML='<div style="grid-column:span 3;font-size:12px;color:var(--text3);text-align:center;padding:16px">執行一次 workflow 後<br>會自動產生概念標籤</div>';return;}
    var h='<button class="fi fi-all th'+(curThm==='all'?' active':'')+'" onclick="setThm(\'all\')">全部概念<span class="fi-cnt">'+stocks.length+'</span></button>';
    sr.forEach(function(e){var t=e[0],c=e[1];
      h+='<button class="fi th'+(curThm===t?' active':'')+'" onclick="setThm(\''+t+'\')">'+t+'<span class="fi-cnt">'+c+'</span></button>';});
    g.innerHTML=h;
  }
}
function setInd(v){curInd=v;updFLabel();closeFilter();render();}
function setThm(v){curThm=v;updFLabel();closeFilter();render();}
function clearFilter(){curInd='all';curThm='all';curSectorKey='all';updFLabel();render();}
function updFLabel(){
  var lb=document.getElementById('fclr');
  document.getElementById('ind-btn').classList.toggle('on',curInd!=='all'||curSectorKey!=='all');
  document.getElementById('thm-btn').classList.toggle('ton',curThm!=='all');
  if(curThm!=='all'){lb.textContent=curThm+' ✕';lb.style.display='inline';}
  else if(curInd!=='all'){lb.textContent=(IND_S[curInd]||curInd.replace('業',''))+' ✕';lb.style.display='inline';}
  else if(curSectorKey!=='all'){lb.textContent=curSectorKey+' ✕';lb.style.display='inline';}
  else lb.style.display='none';
}

// ─ Settings ─
function doRefresh(){
  var btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  // 強制重新載入 stocks.json（加時間戳破快取）
  fetch(stocksUrl())
    .then(function(r){return r.json();})
    .then(function(d){
      var all=d.stocks||[];
      etfs  =all.filter(function(s){return s.code.startsWith('00');});
      stocks=all.filter(function(s){return !s.code.startsWith('00');});
      sectorData=d.sector_rotation||{};
      document.getElementById('upd').innerHTML='更新：'+d.updated_at+'<br>共 '+(d.total||stocks.length)+' 檔';
      render();
      btn.classList.remove('spinning');
    })
    .catch(function(){
      btn.classList.remove('spinning');
      btn.style.color='var(--red)';
      setTimeout(function(){btn.style.color='';},2000);
    });
}

function openCM(code,e){
  if(e)e.stopPropagation();
  var s=stocks.filter(function(x){return x.code===code;})[0];if(!s)return;
  var raw=s.chips_raw||{},dl=raw.daily||[];
  document.getElementById('mtitle').textContent=s.name+' 籌碼分析';
  document.getElementById('msub').textContent='資料日期：'+(dl[0]&&dl[0].date||'N/A');
  function sb(lbl,val,sub,unit,pct){unit=unit||'張';var c=val>0?'nup':val<0?'ndn':'nfl';var pp=pct?'<span style="font-size:10px;opacity:.7"> ('+pct+'%)</span>':'';return '<div class="sbox"><div class="slbl">'+lbl+'</div><div class="sval '+c+'">'+sgn(val)+(val||0).toLocaleString()+unit+pp+'</div><div class="ssub">'+sub+'</div></div>';}
  var td=(raw.foreign||0)+(raw.trust||0)+(raw.dealer||0);
  var cs=(raw.foreign_con_sum||0)+(raw.trust_con_sum||0)+(raw.dealer_con_sum||0);
  var s30=(raw.foreign_sum30||0)+(raw.trust_sum30||0)+(raw.dealer_sum30||0);
  var holding=s.holding;
  var pieH="";

  var h='<div class="sum3">'+sb('今日合計',td,'三大法人')+sb('連續累積',cs,'本波段')+sb('近30日',s30,'累積淨買')+'</div>';
  h+='<div class="sum3" style="margin-bottom:14px">'+(function(){
    var vol=s.volume?Math.round(s.volume/1000):0;
    var fp=vol>0?Math.round(Math.abs(raw.foreign||0)/vol*100):null;
    var tp=vol>0?Math.round(Math.abs(raw.trust||0)/vol*100):null;
    var dp=vol>0?Math.round(Math.abs(raw.dealer||0)/vol*100):null;
    return sb('外資今日',raw.foreign||0,'連續'+(raw.foreign_con||0)+'日','張',fp)+
           sb('投信今日',raw.trust||0,'連續'+(raw.trust_con||0)+'日','張',tp)+
           sb('自營今日',raw.dealer||0,'連續'+(raw.dealer_con||0)+'日','張',dp);
  })()+'</div>';
  var f30=raw.foreign_sum30||0,t30=raw.trust_sum30||0,d30=raw.dealer_sum30||0,a30=Math.abs(f30)+Math.abs(t30)+Math.abs(d30)||1;
  function br(nm,val){var p=Math.round(Math.abs(val)/a30*100),bc=val>=0?'buy':'sell',bc2=val>0?'var(--green)':val<0?'var(--red)':'var(--text3)';
    return '<div class="brow"><span class="bname">'+nm+'</span><div class="btrack"><div class="bfill '+bc+'" style="width:'+p+'%"></div></div><span class="bpct" style="color:'+bc2+';white-space:nowrap">'+sgn(val)+val.toLocaleString()+'張</span></div>';}
  h+='<div class="bsec"><div class="btitle">近30日各法人佔比</div>'+br('外資',f30)+br('投信',t30)+br('自營商',d30)+'</div>';
  var r5=dl.slice(0,5).map(function(d){function td2(v){return '<td class="'+nc(v)+' tdnum">'+sgn(v)+v.toLocaleString()+'張</td>';}
    var dobj=new Date(d.date);var dow=['日','一','二','三','四','五','六'][dobj.getDay()];
    return '<tr><td>'+d.date.slice(5)+'('+dow+')</td>'+td2(d.foreign)+td2(d.trust)+td2(d.dealer)+td2(d.total)+'</tr>';}).join('');
  h+='<div class="dtitle">最近5日逐日明細</div><table class="dtbl"><thead><tr><th>日期</th><th>外資</th><th>投信</th><th>自營</th><th>合計</th></tr></thead><tbody>'+r5+'</tbody></table>';
  // 借券賣出
  var lending=s.lending;
  var lendHist=s.lending_history&&s.lending_history.length?s.lending_history:lending&&lending.daily||[];
  if(lending&&(lending.volume>0||lending.balance>0)){
    var ldays=lendHist.slice(0,5).reverse();
    var lvols=ldays.map(function(d){return d.balance||d.volume||0;});
    var lmax=Math.max.apply(null,lvols)||1;
    var lW=240,lH=44,lP=4,lBottom=14;
    var lDraw=lH-lBottom;
    var lPts=lvols.map(function(v,i){
      return (lP+(lW-lP*2)/(Math.max(lvols.length-1,1))*i).toFixed(1)+','+(lDraw-lP-(v/lmax)*(lDraw-lP*2)).toFixed(1);
    }).join(' ');
    var spark='<svg viewBox="0 0 '+lW+' '+lH+'" style="width:100%;height:44px">'+
      '<polyline points="'+lPts+'" fill="none" stroke="rgba(239,68,68,.5)" stroke-width="1.5" stroke-linejoin="round"/>'+
      ldays.map(function(d,i){
        var x=(lP+(lW-lP*2)/(Math.max(lvols.length-1,1))*i).toFixed(1);
        var y=(lDraw-lP-(lvols[i]/lmax)*(lDraw-lP*2)).toFixed(1);
        return '<circle cx="'+x+'" cy="'+y+'" r="2.5" fill="var(--red)"/>'+
               '<text x="'+x+'" y="'+(lH-2)+'" text-anchor="middle" font-size="8" fill="var(--text3)">'+d.date.slice(5)+'</text>';
      }).join('')+'</svg>';
    h+='<div class="lend-sec"><div class="lend-card" onclick="toggleLend(this,event)">'+
      '<div style="display:flex;align-items:center;gap:8px">'+
        '<span class="lend-badge">📉 借券賣出</span>'+
        '<span style="flex:1;font-size:11px;color:var(--text3)">餘額 '+(lending.balance||0).toLocaleString()+'張</span>'+
        '<span style="font-size:14px;font-weight:800;color:var(--red)">今日 '+(lending.volume||0).toLocaleString()+'張</span>'+
        '<span style="font-size:10px;color:var(--text3);margin-left:4px">▾</span>'+
      '</div>'+
      '<div class="lend-expand" ontouchstart="event.stopPropagation()" ontouchmove="event.stopPropagation()" ontouchend="event.stopPropagation()">'+
        '<div class="lend-spark-title">近期趨勢</div>'+spark+
      '</div>'+
    '</div></div>';
  }

  document.getElementById('mbody').innerHTML=h;
  document.getElementById('mov').classList.add('open');
  document.getElementById('modal').classList.add('open');
  lockScroll();
}

// ── Bottom Sheet 下拉關閉 ────────────────────────
var _lockScrollY=0;
function lockScroll(){
  _lockScrollY=window.scrollY;
  document.body.style.overflow='hidden';
  document.body.style.top='-'+_lockScrollY+'px';
  document.body.style.position='fixed';
  document.body.style.width='100%';
}
function unlockScroll(){
  document.body.style.overflow='';
  document.body.style.position='';
  document.body.style.top='';
  document.body.style.width='';
  window.scrollTo(0,_lockScrollY);
}

function makeSheet(sheetId, closeFn){
  var sheet=document.getElementById(sheetId);
  var handle=sheet.querySelector('.mdrag,.pdrag');
  var startY=0,curY=0,drag=false,didDrag=false;

  function start(y,target){
    startY=y; curY=0; drag=true; didDrag=false; sheet.style.transition='none';
  }
  function move(e){
    if(!drag) return;
    var dy=e.touches[0].clientY-startY;
    // 往上滑（dy<0）：完全不攔截，讓 modal 自己捲
    if(dy<0){ drag=false; return; }
    // 往下滑（dy>0）：只有 modal 捲到頂才允許下拉關閉
    // modal 本身捲動到頂才允許下拉
    if(sheet.scrollTop>0){ drag=false; return; }
    didDrag=true;
    curY=dy;
    sheet.style.transform='translateY('+dy+'px)';
    e.preventDefault();
  }
  function end(){
    if(!drag) return; drag=false;
    if(curY>90){
      // 先滑出畫面，動畫結束後再關閉
      sheet.style.transition='transform .25s ease';
      sheet.style.transform='translateY(100%)';
      setTimeout(function(){ closeFn(); }, 260);
    } else {
      sheet.style.transition='transform .25s ease';
      sheet.style.transform='';
    }
  }

  sheet.addEventListener('touchstart',function(e){ start(e.touches[0].clientY); },{passive:true});
  sheet.addEventListener('touchmove', move, {passive:false});
  sheet.addEventListener('touchend', end);

  // handle 點擊關閉（用 touchend 模擬，避免 click 在拖動後觸發）
  if(handle){
    handle.addEventListener('touchend', function(e){
      if(!didDrag){ e.preventDefault(); closeFn(); }
    });
  }
}

// ── 景氣燈號（國發會）──────────────────────────────────
async function fetchBizCycle(){
  try{
    var res=await fetch('https://index.ndc.gov.tw/n/zh_tw/data/business_cycle',{signal:AbortSignal.timeout?AbortSignal.timeout(8000):undefined});
    var d=await res.json();
    var latest=Array.isArray(d)?d[d.length-1]:{};
    var score=parseInt(latest.score||latest.composite_score||0)||null;
    if(!score) throw new Error('no score');
    var light=score>=38?'red':score>=32?'yellow':score>=23?'green':score>=17?'yellow_blue':'blue';
    var labels={red:'景氣過熱 🔴',yellow:'景氣活絡 🟡',green:'景氣穩定 🟢',yellow_blue:'景氣轉弱 🟡🔵',blue:'景氣低迷 🔵'};
    bizCycle={score:score,light:light,label:labels[light]};
  }catch(e){
    bizCycle={score:null,light:'green',label:'景氣穩定（預設）'};
  }
}

async function loadData(){
  var _step='init';
  try{
    _step='fetch:'+stocksUrl();
    var res=await fetch(stocksUrl());
    _step='http-check('+res.status+')';
    if(!res.ok)throw new Error('HTTP '+res.status);
    _step='json-parse';
    var data=await res.json();
    _step='process';
    var allStocks=data.stocks||[];
    sectorData=data.sector_rotation||{};
    etfs  =allStocks.filter(function(s){return s.code.startsWith('00');});
    stocks=allStocks.filter(function(s){return !s.code.startsWith('00');});
    document.getElementById('upd').innerHTML='更新：'+(data.updated_at||'')+'<br>共 '+(data.total||stocks.length)+' 檔';
    var foi=data.futures_oi;
    if(foi){window._foiData=foi;
      var bar=document.getElementById('foiBar');
      var net=foi.net,cls=net>0?'foi-bull':'foi-bear';
      document.getElementById('foiDetail').textContent='多單 '+foi.long.toLocaleString()+' 口　空單 '+foi.short.toLocaleString()+' 口';
      document.getElementById('foiNet').innerHTML='<span class="'+cls+'">'+(net>0?'+':'')+net.toLocaleString()+'口 '+(net>0?'▲偏多':'▼偏空')+'</span>';
      if(bar)bar.style.display='';
    }
    fetchBizCycle().then(function(){
      renderMacroPreview();
      if(curView==='macro') renderMacroFull();
    });
    _step='render';
    goView('home');
    render();
  }catch(err){
    document.getElementById('app').innerHTML='<div class="status"><span>⚠️ 數據載入失敗</span><span style="font-size:11px;word-break:break-all">['+_step+'] '+err.message+'</span></div>';
  }
}
loadData();
