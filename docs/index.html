<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="選股雷達" />
  <link rel="manifest" href="manifest.json" />
  <title>選股雷達</title>
  <style>
    :root {
      --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
      --text: #f0f0f0; --text2: #888; --text3: #555;
      --green: #00c896; --red: #ff5c5c; --blue: #4a9eff; --orange: #ff9f43;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, "Helvetica Neue", sans-serif; min-height: 100vh; padding-bottom: 30px; }

    /* Header */
    .header { padding: 52px 16px 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 0.5px solid var(--border); }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .header-top h1 { font-size: 20px; font-weight: 600; }
    .update-time { font-size: 11px; color: var(--text3); }
    .sort-bar { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
    .sort-bar::-webkit-scrollbar { display: none; }
    .sort-btn { flex-shrink: 0; font-size: 12px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .sort-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }

    /* Tabs */
    .tabs { display: flex; margin: 12px 16px 0; border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; }
    .tab { flex: 1; padding: 9px; text-align: center; font-size: 13px; color: var(--text2); cursor: pointer; background: transparent; border: none; transition: all 0.15s; }
    .tab.active { background: var(--bg3); color: var(--text); font-weight: 500; }

    /* Search */
    .search-wrap { padding: 10px 16px 0; }
    .search-input { width: 100%; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 10px; padding: 9px 14px; color: var(--text); font-size: 14px; outline: none; }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus { border-color: var(--border2); }

    /* List */
    .stock-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

    /* Card */
    .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s; }
    .card.open { border-color: var(--border2); }
    @keyframes flash-up { 0%,100%{background:var(--bg2)} 40%{background:rgba(0,200,150,0.12)} }
    @keyframes flash-dn { 0%,100%{background:var(--bg2)} 40%{background:rgba(255,92,92,0.10)} }
    .card.flash-up { animation: flash-up 1s ease; }
    .card.flash-dn { animation: flash-dn 1s ease; }

    .card-header { display: flex; align-items: center; padding: 13px 16px; cursor: pointer; gap: 8px; }
    .card-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .code-badge { font-size: 11px; font-weight: 600; color: var(--text3); background: var(--bg3); padding: 3px 8px; border-radius: 6px; flex-shrink: 0; }
    .stock-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hot-badge { font-size: 12px; flex-shrink: 0; }
    .card-right { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .card-price { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
    .card-price-num { font-size: 13px; font-weight: 600; }
    .card-price-chg { font-size: 11px; }
    .up { color: var(--green); }
    .dn { color: var(--red); }
    .icons { display: flex; gap: 3px; }
    .icon { font-size: 13px; }
    .chevron { font-size: 10px; color: var(--text3); transition: transform 0.25s; flex-shrink: 0; }
    .card.open .chevron { transform: rotate(180deg); }
    .watch-btn { font-size: 15px; background: none; border: none; cursor: pointer; padding: 2px; opacity: 0.3; transition: opacity 0.15s; flex-shrink: 0; }
    .watch-btn.on { opacity: 1; }

    /* Detail */
    .detail { display: none; border-top: 0.5px solid var(--border); }
    .card.open .detail { display: block; }

    /* Price row */
    .price-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
    .price-left { display: flex; flex-direction: column; gap: 4px; }
    .price-main { display: flex; align-items: baseline; gap: 8px; }
    .price { font-size: 22px; font-weight: 600; }
    .change { font-size: 13px; }
    .price-range { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
    .range-bar-wrap { width: 80px; height: 4px; background: var(--bg3); border-radius: 2px; position: relative; }
    .range-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--red), var(--green)); position: absolute; left: 0; }
    .range-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text); position: absolute; top: -1px; transform: translateX(-50%); }

    /* Score progress bar */
    .score-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .score-label { font-size: 12px; font-weight: 500; color: var(--text2); }
    .progress-bar { width: 60px; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

    /* Section */
    .section { padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
    .section:last-child { border-bottom: none; }
    .section-title { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.8px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .check-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
    .check-label { font-size: 13px; color: var(--text2); }
    .check-val { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; }
    .badge { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; }
    .badge.pass { background: rgba(0,200,150,0.15); color: var(--green); }
    .badge.fail { background: rgba(255,92,92,0.12); color: var(--red); }

    /* Volume bar */
    .vol-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; gap: 10px; }
    .vol-bar-wrap { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; max-width: 80px; }
    .vol-bar-fill { height: 100%; border-radius: 2px; background: var(--orange); }

    /* News */
    .news-item { padding: 7px 0; border-bottom: 0.5px solid var(--border); }
    .news-item:last-child { border-bottom: none; }
    .news-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
    .news-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 5px; background: rgba(74,158,255,0.15); color: var(--blue); }
    .news-source { font-size: 11px; color: var(--text3); }
    .news-text { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 4px; }
    .news-link { font-size: 11px; color: var(--blue); text-decoration: none; }

    /* Status */
    .status { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--text3); font-size: 14px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border2); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; line-height: 2.2; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>選股雷達 📡</h1>
    <span class="update-time" id="update-time">載入中...</span>
  </div>
  <div class="sort-bar" id="sort-bar">
    <button class="sort-btn active" data-sort="score">符合項目</button>
    <button class="sort-btn" data-sort="change_desc">漲幅 ↓</button>
    <button class="sort-btn" data-sort="change_asc">跌幅 ↓</button>
    <button class="sort-btn" data-sort="price_desc">股價 ↓</button>
    <button class="sort-btn" data-sort="price_asc">股價 ↑</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-all" onclick="setTab('all')">全部</button>
  <button class="tab" id="tab-large" onclick="setTab('large')">🏢 大型股</button>
  <button class="tab" id="tab-small" onclick="setTab('small')">🚀 中小型</button>
  <button class="tab" id="tab-watch" onclick="setTab('watch')">⭐ 自選</button>
</div>
<div class="search-wrap">
  <input class="search-input" id="search" placeholder="搜尋股票名稱或代碼..." oninput="render()" />
</div>

<div id="app">
  <div class="status"><div class="spinner"></div><span>載入數據中...</span></div>
</div>

<script>
let allStocks = [];
let prevPrices = {};
let currentSort = 'score';
let currentTab = 'all';
let openCards = {};
let watchlist = JSON.parse(localStorage.getItem('watchlist') || '[]');

function saveWatch() { localStorage.setItem('watchlist', JSON.stringify(watchlist)); }

function toggleWatch(code, e) {
  e.stopPropagation();
  const idx = watchlist.indexOf(code);
  if (idx === -1) watchlist.push(code); else watchlist.splice(idx, 1);
  saveWatch(); render();
}

function setTab(tab) {
  currentTab = tab;
  ['all','large','small','watch'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.classList.toggle('active', tab === t);
  });
  render();
}

function getScore(s) {
  let passed = 0, total = 0;
  [s.fundamental, s.revenue, s.chips].filter(Boolean).forEach(sec => {
    const items = sec.items || (Array.isArray(sec) ? sec : []);
    items.forEach(i => { total++; if (i.pass) passed++; });
  });
  if (s.topic && s.topic.news && s.topic.news.length > 0) { total++; passed++; }
  return { passed, total };
}

function getProgressColor(pct) {
  if (pct >= 70) return 'var(--green)';
  if (pct >= 40) return 'var(--orange)';
  return 'var(--red)';
}

function getSorted(stocks) {
  const arr = [...stocks];
  if (currentSort === 'score') arr.sort((a, b) => getScore(b).passed - getScore(a).passed);
  else if (currentSort === 'change_desc') arr.sort((a, b) => b.change_pct - a.change_pct);
  else if (currentSort === 'change_asc') arr.sort((a, b) => a.change_pct - b.change_pct);
  else if (currentSort === 'price_desc') arr.sort((a, b) => b.price - a.price);
  else if (currentSort === 'price_asc') arr.sort((a, b) => a.price - b.price);
  return arr;
}

function renderNews(news) {
  if (!news || !news.length) return '<div style="font-size:13px;color:var(--text3);padding:4px 0;">暫無相關新聞</div>';
  return news.map(n => `
    <div class="news-item">
      <div class="news-top">
        <span class="news-tag">${n.tag || '新聞'}</span>
        <span class="news-source">${n.source || ''}</span>
      </div>
      <div class="news-text">${n.title || n.text || ''}</div>
      ${n.url ? `<a class="news-link" href="${n.url}" target="_blank">閱讀原文 →</a>` : ''}
    </div>`).join('');
}

function renderItems(raw) {
  const items = (raw && raw.items) ? raw.items : (Array.isArray(raw) ? raw : []);
  if (!items.length) return '<div style="font-size:13px;color:var(--text3);padding:4px 0;">數據更新中...</div>';
  return items.map(i => `
    <div class="check-row">
      <span class="check-label">${i.label}</span>
      <span class="check-val">
        <span class="badge ${i.pass ? 'pass' : 'fail'}">${i.pass ? '✓' : '✗'}</span>
        ${i.value}
      </span>
    </div>`).join('');
}

function renderVolumeSection(s) {
  if (!s.volume_ratio && !s.volume) return '';
  const ratio = s.volume_ratio || 1;
  const pct = Math.min(ratio / 3 * 100, 100);
  const hot = ratio >= 2;
  return `
    <div class="section">
      <div class="section-title">📊 成交量</div>
      <div class="vol-row">
        <span class="check-label">量比（相對均量）</span>
        <span class="check-val" style="gap:8px;">
          ${hot ? '<span style="color:var(--orange);font-size:12px;">🔥 爆量</span>' : ''}
          <span>${ratio.toFixed(1)}x</span>
        </span>
      </div>
      <div class="vol-row">
        <span class="check-label" style="font-size:11px;color:var(--text3);">量能強度</span>
        <div class="vol-bar-wrap"><div class="vol-bar-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
}

function render52w(s) {
  if (!s.week52_high || !s.week52_low) return '';
  const high = s.week52_high, low = s.week52_low, cur = s.price;
  const pos = high === low ? 50 : Math.round((cur - low) / (high - low) * 100);
  return `
    <div class="section">
      <div class="section-title">📉 52週區間</div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:6px;">
        <span>低 $${low.toLocaleString()}</span>
        <span>高 $${high.toLocaleString()}</span>
      </div>
      <div class="range-bar-wrap" style="width:100%;height:6px;">
        <div class="range-bar-fill" style="width:100%;"></div>
        <div class="range-dot" style="left:${pos}%;"></div>
      </div>
      <div style="text-align:center;font-size:11px;color:var(--text2);margin-top:6px;">
        目前位於近52週 <strong>${pos}%</strong> 位置
      </div>
    </div>`;
}

function renderCard(s) {
  const { passed, total } = getScore(s);
  const isOpen = openCards[s.code];
  const isWatched = watchlist.includes(s.code);
  const up = s.change_pct >= 0;
  const sign = up ? '+' : '';
  const cls = up ? 'up' : 'dn';
  const pct = total > 0 ? Math.round(passed / total * 100) : 0;
  const color = getProgressColor(pct);
  const icons = (s.icons || []).map(ic => `<span class="icon">${ic}</span>`).join('');
  const isHot = s.volume_ratio && s.volume_ratio >= 2;

  return `
    <div class="card ${isOpen ? 'open' : ''}" id="card-${s.code}">
      <div class="card-header" onclick="toggle('${s.code}')">
        <div class="card-left">
          <span class="code-badge">${s.code}</span>
          <span class="stock-name">${s.name}</span>
          ${isHot ? '<span class="hot-badge">🔥</span>' : ''}
        </div>
        <div class="card-right">
          <div class="card-price">
            <span class="card-price-num ${cls}">$${Number(s.price).toLocaleString()}</span>
            <span class="card-price-chg ${cls}">${sign}${s.change_pct}%</span>
          </div>
          <div class="icons">${icons}</div>
          <button class="watch-btn ${isWatched ? 'on' : ''}" onclick="toggleWatch('${s.code}', event)">⭐</button>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="detail">
        <div class="price-row">
          <div class="price-left">
            <div class="price-main">
              <span class="price ${cls}">$${Number(s.price).toLocaleString()}</span>
              <span class="change ${cls}">${sign}${s.change} (${sign}${s.change_pct}%)</span>
            </div>
            ${s.week52_high && s.week52_low ? `
            <div class="price-range">
              <span>52週</span>
              <div class="range-bar-wrap">
                <div class="range-bar-fill" style="width:100%;"></div>
                <div class="range-dot" style="left:${s.week52_high===s.week52_low?50:Math.round((s.price-s.week52_low)/(s.week52_high-s.week52_low)*100)}%;"></div>
              </div>
              <span>${s.week52_high===s.week52_low?50:Math.round((s.price-s.week52_low)/(s.week52_high-s.week52_low)*100)}%</span>
            </div>` : ''}
          </div>
          <div class="score-wrap">
            <span class="score-label" style="color:${color}">${passed}/${total} 項符合</span>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${pct}%;background:${color};"></div>
            </div>
          </div>
        </div>
        <div class="section">
          <div class="section-title">📰 話題性</div>
          ${renderNews(s.topic && s.topic.news)}
        </div>
        <div class="section">
          <div class="section-title">💰 基本面</div>
          ${renderItems(s.fundamental)}
        </div>
        <div class="section">
          <div class="section-title">📈 營收動能</div>
          ${renderItems(s.revenue)}
        </div>
        <div class="section">
          <div class="section-title">🏦 籌碼面</div>
          ${renderItems(s.chips)}
        </div>
        ${renderVolumeSection(s)}
      </div>
    </div>`;
}

function render() {
  const query = (document.getElementById('search').value || '').trim().toLowerCase();
  let stocks = allStocks;
  if (currentTab === 'large') stocks = stocks.filter(s => s.category === 'large');
  else if (currentTab === 'small') stocks = stocks.filter(s => s.category === 'mid_small');
  else if (currentTab === 'watch') stocks = stocks.filter(s => watchlist.includes(s.code));
  if (query) stocks = stocks.filter(s => s.name.toLowerCase().includes(query) || s.code.includes(query));
  const sorted = getSorted(stocks);
  const app = document.getElementById('app');
  if (!sorted.length) {
    const emptyMsg = {
      watch: '還沒有自選股<br>點卡片右側的 ⭐ 加入',
      large: '大型股數據更新中...',
      small: '中小型股數據更新中...',
    };
    app.innerHTML = '<div class="empty">' + (emptyMsg[currentTab] || '找不到相關股票') + '</div>';
    return;
  }
  app.innerHTML = `<div class="stock-list">${sorted.map(renderCard).join('')}</div>`;

  // 閃爍動畫
  sorted.forEach(s => {
    if (prevPrices[s.code] !== undefined && prevPrices[s.code] !== s.price) {
      const el = document.getElementById('card-' + s.code);
      if (el) {
        el.classList.remove('flash-up', 'flash-dn');
        void el.offsetWidth;
        el.classList.add(s.price > prevPrices[s.code] ? 'flash-up' : 'flash-dn');
      }
    }
    prevPrices[s.code] = s.price;
  });
}

function toggle(code) {
  openCards[code] = !openCards[code];
  render();
  if (openCards[code]) {
    setTimeout(() => {
      const el = document.getElementById('card-' + code);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }
}

document.getElementById('sort-bar').addEventListener('click', e => {
  const btn = e.target.closest('.sort-btn');
  if (!btn) return;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSort = btn.dataset.sort;
  render();
});

async function loadData() {
  try {
    const res = await fetch('stocks.json?t=' + Date.now());
    if (!res.ok) throw new Error('無法載入數據');
    const data = await res.json();
    allStocks = data.stocks || [];
    const total = data.total || allStocks.length;
    document.getElementById('update-time').textContent = '更新：' + (data.updated_at || '') + '｜共' + total + '檔';
    render();
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="status">
        <span>⚠️ 數據載入失敗</span>
        <span style="font-size:12px;">${e.message}</span>
      </div>`;
  }
}

loadData();
</script>
</body>
</html>
