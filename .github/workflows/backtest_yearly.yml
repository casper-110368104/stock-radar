name: 逐年獨立回測（2022~2025 樣本外驗證）

on:
  workflow_dispatch:   # 手動觸發，可在 Run workflow 選擇要跑的 branch

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 四年資料下載 + 回測，預估 90~150 分鐘

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run yearly backtest
        run: python backtest_yearly.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/backtest_yearly.json
          git diff --staged --quiet || git commit -m "逐年回測結果：$(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
