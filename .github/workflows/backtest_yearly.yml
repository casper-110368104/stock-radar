name: 逐年獨立回測（2022~2025 樣本外驗證）

on:
  workflow_dispatch:
  push:
    branches:
      - claude/strategy-review-session-a2yXS
    paths:
      - backtest_yearly.py
      - backtest_q1.py
      - signals.py

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 四年資料下載 + 回測，預估 90~150 分鐘

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build sector map（全 TWSE 類股對照）
        run: python build_sector_map.py

      - name: Run yearly backtest
        run: python backtest_yearly.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/sector_map.json docs/backtest_yearly.json
          git diff --staged --quiet || git commit -m "逐年回測結果：$(date +'%Y-%m-%d %H:%M')"
          for i in 1 2 3 4; do
            git pull --rebase origin ${{ github.ref_name }} && \
            git push origin HEAD:${{ github.ref_name }} && break
            echo "Push attempt $i failed, retrying in $((i * 4))s..."
            sleep $((i * 4))
          done
