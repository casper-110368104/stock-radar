name: Walk-Forward 回測（2024-Q1 ~ 2026-Q1）

on:
  workflow_dispatch:   # 手動觸發，可在 Run workflow 選擇要跑的 branch

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 5 個季度資料，預計 40-70 分鐘

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Walk-Forward backtest
        run: python backtest_q1.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/backtest_q1.json
          git diff --staged --quiet || git commit -m "Walk-Forward 回測結果：$(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
