name: Q1 2025 回測

on:
  workflow_dispatch:   # 只手動觸發，避免每天自動跑

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 最長 60 分鐘（抓資料約 15-20 分鐘）

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Q1 backtest
        run: python backtest_q1.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/backtest_q1.json
          git diff --staged --quiet || git commit -m "Q1 2025 回測結果：$(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
